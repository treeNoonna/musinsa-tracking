app = "musinsa-tracking"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  TRACKER_DB_PATH = "/data/prices.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "tracker_data"
  destination = "/data"
